# в”Җв”Җ Prompt layout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
format = """
[](fg:#303446)\
$os\
$username\
[](bg:#414559 fg:#303446)\
$directory\
[](fg:#414559 bg:#51576d)\
$git_branch\
$git_status\
[](fg:#51576d bg:#303446)\
$nodejs\
$python\
$rust\
$golang\
$java\
$kotlin\
$php\
$c\
$cmake\
$dart\
$dotnet\
$elixir\
$haskell\
$lua\
$perl\
$ruby\
$scala\
$swift\
$zig\
$docker_context\
[](fg:#303446)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

# в”Җв”Җ Right-side fill spacer в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[fill]
symbol = " "

# в”Җв”Җ OS icon в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
style = "bg:#303446 fg:#ca9ee6"    # mauve

[os.symbols]
Alpine = "пҢҖ "
Android = "п…» "
Arch = "у°ЈҮ "
Artix = "пҢҹ "
CachyOS = "у°ЈҮ "
CentOS = "пҢ„ "
Debian = "у°Јҡ "
EndeavourOS = "пҶ— "
Fedora = "у°Јӣ "
FreeBSD = "пҠҸ "
Garuda = "пҢ· "
Gentoo = "у°ЈЁ "
Kali = "пҢ§ "
Linux = "п…ј "
Macos = "пҢӮ "
Manjaro = "пҢ’ "
MidnightBSD = "пҶҶ "
Mint = "у°Јӯ "
NetBSD = "пҠҷ "
NixOS = "пҢ“ "
OpenBSD = "пҢЁ "
openSUSE = "пҢ” "
OracleLinux = "у°Ң· "
PikaOS = "уұ—Ҷ "
Pop = "пҢӘ "
Raspbian = "у°җҝ "
Redhat = "пҢ– "
RedHatEnterprise = "пҢ– "
Redox = "у°Җҳ "
RockyLinux = "пҢ« "
Solus = "пҢў "
SUSE = "пҢ” "
Ubuntu = "пҢӣ "
Unknown = "у°Җ¶ "
Void = "пҢ® "
Windows = "у°ҚІ "

# в”Җв”Җ Username в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
show_always  = true
style_user   = "bg:#303446 fg:#8caaee bold"   # blue
style_root   = "bg:#303446 fg:#e78284 bold"   # red (root warning)
format       = '[ $user ]($style)'

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
style            = "bg:#414559 fg:#ca9ee6 bold"   # mauve
format           = "[ у°үӢ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
read_only        = " у°Ңҫ"
read_only_style  = "bg:#414559 fg:#e78284"

[directory.substitutions]
"~"         = "у°ңҘ "
"Documents" = "у°Ҳҷ "
"Downloads" = "у°Үҡ "
"Music"     = "у°қҡ "
"Pictures"  = "у°Ӣ© "
"Videos"    = "у°•§ "
"Desktop"   = "у°–І "
"Developer" = "у°ІӢ "
".config"   = "оҳ• "

# в”Җв”Җ Git branch в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
style    = "bg:#51576d fg:#f4b8e4 bold"   # pink
format   = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol   = "пҗҳ "

# в”Җв”Җ Git status в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_status]
style     = "bg:#51576d fg:#ef9f76"   # peach
format    = '([$all_status$ahead_behind ]($style))'
conflicted = "у°һҮ "
ahead      = "вҮЎ${count} "
behind     = "вҮЈ${count} "
diverged   = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} "
up_to_date = ""
untracked  = "? "
stashed    = "у°Ҹў "
modified   = "! "
staged     = "+ "
renamed    = "В» "
deleted    = "вңҳ "

# в”Җв”Җ Language versions в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
