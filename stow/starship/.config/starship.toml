# в”Җв”Җ Command duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
style             = "fg:#737994 italic"   # overlay1
format            = '[ уұ‘Ӯ $duration ]($style)'
min_time          = 2_000
show_milliseconds = false

# в”Җв”Җ Time в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[time]
disabled      = false
style         = "fg:#626880"   # surface2
format        = '[ уұ‘ғ $time ]($style)'
time_format   = "%H:%M"
use_12hr      = false

# в”Җв”Җ Prompt character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вқҜ](bold fg:#ca9ee6)"   # mauve on success
error_symbol   = "[вқҜ](bold fg:#e78284)"   # red on error
vimcmd_symbol  = "[вқ®](bold fg:#ca9ee6)"   # mauve in vim mode

